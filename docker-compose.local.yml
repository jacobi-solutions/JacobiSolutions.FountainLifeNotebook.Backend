services:
  mongo:
    image: mongo:8.0
    container_name: fountain-life-notebook-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  backend:
    image: node:22-alpine
    container_name: fountain-life-notebook-backend
    working_dir: /app
    depends_on:
      - mongo
    environment:
      APP_ENV: local
      AUTH_MODE: local
      AWS_REGION: us-east-1
      DOCUMENT_STORAGE_PROVIDER: local
      DOCUMENT_STORAGE_ROOT: var/uploads
      FRONTEND_ORIGIN: http://localhost:5173
      LLM_PROVIDER: mock
      LOG_APPLICATION_NAME: FountainLifeNotebook.Backend
      LOG_DIRECTORY: var/logs
      LOG_FILE_NAME: backend-%DATE%.log
      LOG_LEVEL: Information
      LOCAL_AUTH_EMAIL: local.user@fountainlife.local
      LOCAL_AUTH_USER_ID: local-user
      LOCAL_AUTH_USERNAME: Local User
      MONGODB_DATABASE: fountain-life-notebook
      MONGODB_URI: mongodb://mongo:27017/fountain-life-notebook
      OPENAI_MODEL: gpt-4.1-mini
      PORT: 3000
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - backend_node_modules:/app/node_modules
      - backend_uploads:/app/var/uploads
    command: sh -c "npm ci && npm run start:dev"

  frontend:
    image: node:22-alpine
    container_name: fountain-life-notebook-frontend
    working_dir: /app
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:3000/api
      VITE_AUTH_MODE: local
      VITE_COGNITO_AUTHORITY: ''
      VITE_COGNITO_CLIENT_ID: ''
      VITE_COGNITO_REDIRECT_URI: http://localhost:5173
      VITE_LOCAL_AUTH_EMAIL: local.user@fountainlife.local
      VITE_LOCAL_AUTH_USER_ID: local-user
      VITE_LOCAL_AUTH_USERNAME: Local User
    ports:
      - '5173:5173'
    volumes:
      - ../jacobi-solutions.fountain-life-notebook.frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"

volumes:
  backend_node_modules:
  backend_uploads:
  frontend_node_modules:
  mongo_data:
